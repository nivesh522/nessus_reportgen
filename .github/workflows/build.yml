name: Build Binaries and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
        arch: [x64, arm64]
        exclude:
          - os: windows-latest
            arch: arm64  # Windows ARM64 support can be added later if needed

    defaults:
      run:
        shell: bash

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        architecture: ${{ matrix.arch }}

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: false
        installer-parallel: true

    - name: Verify Poetry Installation
      run: |
        poetry --version

    - name: Install dependencies
      run: |
        poetry install --with dev

    - name: Build executable
      run: |
        poetry run pyinstaller --clean --onefile --name nessus-reportgen --paths src main.py

    - name: Prepare release assets
      run: |
        cd dist
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          mv nessus-reportgen.exe nessus-reportgen-windows-${{ matrix.arch }}.exe
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          mv nessus-reportgen nessus-reportgen-macos-${{ matrix.arch }}
        else
          mv nessus-reportgen nessus-reportgen-linux-${{ matrix.arch }}
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nessus-reportgen-${{ matrix.os }}-${{ matrix.arch }}
        path: dist/nessus-reportgen-*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts/

    - name: Display structure of downloaded files
      run: ls -laR ./artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./artifacts/nessus-reportgen-ubuntu-22.04-x64/nessus-reportgen-linux-x64
          ./artifacts/nessus-reportgen-ubuntu-22.04-arm64/nessus-reportgen-linux-arm64
          ./artifacts/nessus-reportgen-windows-latest-x64/nessus-reportgen-windows-x64.exe
          ./artifacts/nessus-reportgen-macos-latest-x64/nessus-reportgen-macos-x64
          ./artifacts/nessus-reportgen-macos-latest-arm64/nessus-reportgen-macos-arm64
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
