name: Build Binaries and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            binary_name: nessus-reportgen-linux-x64
          - os: ubuntu-22.04 
            arch: arm64
            binary_name: nessus-reportgen-macos-x64
          - os: macos-latest
            arch: arm64
            binary_name: nessus-reportgen-macos-arm64
          - os: windows-latest
            arch: x64
            binary_name: nessus-reportgen-windows-x64.exe

    defaults:
      run:
        shell: bash

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: false
        installer-parallel: true

    - name: Verify Poetry Installation
      run: |
        poetry --version

    - name: Install dependencies
      run: |
        poetry install --with dev

    - name: Build executable
      run: |
        poetry run pyinstaller --clean --onefile --name nessus-reportgen --paths src main.py

    - name: Prepare release assets
      run: |
        cd dist
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          mv nessus-reportgen.exe ${{ matrix.binary_name }}
        else
          mv nessus-reportgen ${{ matrix.binary_name }}
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.binary_name }}
        path: dist/${{ matrix.binary_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts/

    - name: Display structure of downloaded files
      run: ls -laR ./artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./artifacts/nessus-reportgen-linux-x64/nessus-reportgen-linux-x64
          ./artifacts/nessus-reportgen-macos-x64/nessus-reportgen-macos-x64
          ./artifacts/nessus-reportgen-macos-arm64/nessus-reportgen-macos-arm64
          ./artifacts/nessus-reportgen-windows-x64.exe/nessus-reportgen-windows-x64.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
