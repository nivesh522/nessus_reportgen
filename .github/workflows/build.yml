name: Build Binaries and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    defaults:
      run:
        shell: bash

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: false
        installer-parallel: true

    - name: Verify Poetry Installation
      run: |
        poetry --version

    - name: Install dependencies
      run: |
        poetry install --with dev

    - name: Build executable
      run: |
        poetry run pyinstaller --clean --onefile --name nessus-reportgen src/reportgen/cli.py

    - name: Prepare release assets
      run: |
        cd dist
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          mv nessus-reportgen.exe nessus-reportgen-windows.exe
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          mv nessus-reportgen nessus-reportgen-macos
        else
          mv nessus-reportgen nessus-reportgen-linux
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nessus-reportgen-${{ matrix.os }}
        path: dist/nessus-reportgen-*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts/

    - name: Display structure of downloaded files
      run: ls -laR ./artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./artifacts/nessus-reportgen-ubuntu-latest/nessus-reportgen-linux
          ./artifacts/nessus-reportgen-windows-latest/nessus-reportgen-windows.exe
          ./artifacts/nessus-reportgen-macos-latest/nessus-reportgen-macos
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
